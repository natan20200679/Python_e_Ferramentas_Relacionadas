{% extends 'pdv/base.html' %}
{% load static %}
{% block extra_styles %}
<link rel="stylesheet" href="{% static 'login/login.css' %}">
{% endblock %}
{% block content %}
<div class="container">
    <h2>Cadastro</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <p>
            Já tem conta?
            <a href="{% url 'login' %}">Login</a>
        </p>
        <button type="submit" class="btn">Registrar</button>
    </form>
</div>
{% endblock %}
